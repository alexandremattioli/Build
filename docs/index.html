<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time monitoring dashboard for Build Infrastructure servers with multi-method detection (HTTP health checks, GitHub heartbeats, and commit tracking)">
    <title>Build Infrastructure - Real-Time Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #58a6ff;
        }

        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .server-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            transition: all 0.3s;
        }

        .server-card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
        }

        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .server-name {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .status-online { background: #3fb950; box-shadow: 0 0 10px #3fb950; }
        .status-warning { background: #d29922; box-shadow: 0 0 10px #d29922; }
        .status-offline { background: #f85149; box-shadow: 0 0 10px #f85149; }
        .status-checking { background: #8b949e; }

        .refresh-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
        }

        .server-info {
            display: grid;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: #0d1117;
            border-radius: 4px;
            font-size: 13px;
        }

        .info-label {
            color: #8b949e;
        }

        .info-value {
            color: #c9d1d9;
            font-weight: 500;
        }

        .method-indicator {
            font-size: 11px;
            color: #8b949e;
            margin-top: 10px;
            padding: 6px;
            background: #0d1117;
            border-radius: 4px;
        }

        .last-seen {
            font-size: 12px;
            color: #58a6ff;
            margin-top: 5px;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
        }

        .btn:hover {
            background: #2ea043;
        }

        .error {
            color: #f85149;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Build Infrastructure Status</h1>
        <div class="subtitle">Real-time server monitoring with multiple detection methods</div>

        <div class="controls">
            <button class="btn" onclick="refreshAll()" aria-label="Refresh all servers status">Refresh All Servers</button>
            <button class="btn" onclick="toggleAutoRefresh()" aria-label="Toggle automatic refresh every 30 seconds">Toggle Auto-Refresh (30s)</button>
            <span id="auto-status" style="margin-left: 10px; color: #8b949e;">Auto: ON</span>
        </div>

        <div class="grid" id="servers"></div>
    </div>

    <script>
        const SERVERS = [
            { id: 'build1', name: 'Build1', ip: '10.1.3.175', description: 'Codex', port: 8080, commitAuthor: 'Build1 Codex' },
            { id: 'build2', name: 'Build2', ip: '10.1.3.177', description: 'Copilot', port: 8080, commitAuthor: 'Build2 Copilot' },
            { id: 'build3', name: 'Build3', ip: '10.1.3.xxx', description: 'TBD', port: 8080, commitAuthor: 'Build3' },
            { id: 'build4', name: 'Build4', ip: '10.1.3.xxx', description: 'TBD', port: 8080, commitAuthor: 'Build4' },
            { id: 'code1', name: 'Code1', ip: '10.1.3.75', description: 'Windows', port: 8080, commitAuthor: 'Code1-Copilot' },
            { id: 'code2', name: 'Code2', ip: '10.1.3.76', description: 'Windows', port: 8080, commitAuthor: 'Code2-Copilot' }
        ];

        const GITHUB_REPO = 'alexandremattioli/Build';
        let autoRefreshEnabled = true;
        let autoRefreshInterval = null;

        // Initialize dashboard
        function init() {
            renderServers();
            refreshAll();
            startAutoRefresh();
        }

        function renderServers() {
            const container = document.getElementById('servers');
            container.innerHTML = SERVERS.map(server => `
                <div class="server-card" id="card-${server.id}">
                    <div class="server-header">
                        <div class="server-name">
                            <span class="status-dot status-checking" id="dot-${server.id}"></span>
                            ${server.name}
                        </div>
                        <button class="refresh-btn" onclick="checkServer('${server.id}')" aria-label="Refresh ${server.name} status">Refresh</button>
                    </div>
                    <div class="server-info" id="info-${server.id}">
                        <div class="info-row">
                            <span class="info-label">Status</span>
                            <span class="info-value" id="status-${server.id}">Checking...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">IP Address</span>
                            <span class="info-value">${server.ip}:${server.port}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Description</span>
                            <span class="info-value">${server.description}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Last Check</span>
                            <span class="info-value" id="lastcheck-${server.id}">Never</span>
                        </div>
                    </div>
                    <div class="last-seen" id="lastseen-${server.id}"></div>
                    <div class="method-indicator" id="method-${server.id}">Initializing...</div>
                    <div class="error" id="error-${server.id}"></div>
                </div>
            `).join('');
        }

        async function checkServer(serverId) {
            const server = SERVERS.find(s => s.id === serverId);
            if (!server) return;

            updateStatus(serverId, 'checking', 'Checking...', '');

            // Method 1: Try direct HTTP health check (fastest, may fail due to CORS)
            const directResult = await tryDirectHealthCheck(server);
            if (directResult.success) {
                updateStatus(serverId, 'online', 'Online (Direct)', directResult.method);
                return;
            }

            // Method 2: Check GitHub heartbeat file
            const githubResult = await tryGitHubHeartbeat(server);
            if (githubResult.success) {
                const age = githubResult.age;
                if (age < 120) {
                    updateStatus(serverId, 'online', `Online (${age}s ago)`, githubResult.method);
                } else if (age < 300) {
                    updateStatus(serverId, 'warning', `Warning (${age}s ago)`, githubResult.method);
                } else {
                    updateStatus(serverId, 'offline', `Stale (${Math.floor(age/60)}m ago)`, githubResult.method);
                }
                return;
            }

            // Method 3: Check recent GitHub commits
            const commitResult = await tryGitHubCommits(server);
            if (commitResult.success) {
                const age = commitResult.ageSeconds;
                if (age < 300) {  // Less than 5 minutes = ONLINE
                    updateStatus(serverId, 'online', `Online (commit ${commitResult.timeAgo})`, commitResult.method);
                } else if (age < 1800) {  // Less than 30 minutes = WARNING
                    updateStatus(serverId, 'warning', `Active (commit ${commitResult.timeAgo})`, commitResult.method);
                } else {  // More than 30 minutes = OFFLINE
                    updateStatus(serverId, 'offline', `Inactive (last commit ${commitResult.timeAgo})`, commitResult.method);
                }
                return;
            }

            // All methods failed
            updateStatus(serverId, 'offline', 'Offline', 'All detection methods failed');
        }

        async function tryDirectHealthCheck(server) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 2000);

                const response = await fetch(`http://${server.ip}:${server.port}/health`, {
                    method: 'GET',
                    signal: controller.signal,
                    mode: 'cors'
                });

                clearTimeout(timeout);

                if (response.ok) {
                    return { success: true, method: `Direct HTTP ping to ${server.ip}:${server.port}` };
                }
            } catch (e) {
                console.debug(`Direct health check failed for ${server.id}:`, e.message);
            }
            return { success: false };
        }

        async function tryGitHubHeartbeat(server) {
            try {
                const paths = [
                    `${server.id}/heartbeat.json`,
                    `${server.id}/status.json`,
                    `heartbeat_${server.id}.json`,
                    `status_${server.id}.json`
                ];

                for (const path of paths) {
                    try {
                        const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${path}?t=${Date.now()}`;
                        const response = await fetch(url, { cache: 'no-store' });

                        if (response.ok) {
                            const data = await response.json();
                            const timestamp = data.timestamp || data.last_heartbeat || data.last_seen;

                            if (timestamp) {
                                const age = Math.floor((Date.now() - new Date(timestamp).getTime()) / 1000);
                                return {
                                    success: true,
                                    age: age,
                                    method: `GitHub file: ${path} (${formatAge(age)} old)`
                                };
                            }
                        }
                    } catch (e) {
                        continue;
                    }
                }
            } catch (e) {
                console.debug(`GitHub heartbeat check failed for ${server.id}:`, e.message);
            }
            return { success: false };
        }

        async function tryGitHubCommits(server) {
            try {
                const author = server.commitAuthor || server.id;
                const url = `https://api.github.com/repos/${GITHUB_REPO}/commits?per_page=50`;
                const response = await fetch(url);

                if (response.status === 403 || response.status === 429) {
                    console.warn(`⚠️ GitHub API rate limit exceeded. Please wait or add a GitHub token.`);
                    return { success: false, rateLimited: true };
                }

                if (response.ok) {
                    const commits = await response.json();
                    // Look for commits by this server's author name
                    const serverCommit = commits.find(c =>
                        c.commit.author.name === author ||
                        c.commit.author.name.includes(server.name)
                    );

                    if (serverCommit) {
                        const commitDate = new Date(serverCommit.commit.author.date);
                        const age = Math.floor((Date.now() - commitDate.getTime()) / 1000);
                        console.debug(`✅ ${server.id}: Found commit by ${serverCommit.commit.author.name}, age: ${formatAge(age)}`);

                        return {
                            success: true,
                            ageSeconds: age,
                            timeAgo: formatAge(age) + ' ago',
                            method: `Last commit: ${formatAge(age)} ago`
                        };
                    } else {
                        console.debug(`❌ ${server.id}: No commits found for author "${author}"`);
                    }
                }
            } catch (e) {
                console.debug(`GitHub commit check failed for ${server.id}:`, e.message);
            }
            return { success: false };
        }

        function updateStatus(serverId, status, text, method) {
            const dot = document.getElementById(`dot-${serverId}`);
            const statusEl = document.getElementById(`status-${serverId}`);
            const methodEl = document.getElementById(`method-${serverId}`);
            const lastCheckEl = document.getElementById(`lastcheck-${serverId}`);

            dot.className = `status-dot status-${status}`;
            statusEl.textContent = text;
            methodEl.textContent = method || 'No method succeeded';
            lastCheckEl.textContent = new Date().toLocaleTimeString();
        }

        function formatAge(seconds) {
            if (seconds < 60) return `${seconds}s`;
            if (seconds < 3600) return `${Math.floor(seconds/60)}m`;
            if (seconds < 86400) return `${Math.floor(seconds/3600)}h`;
            return `${Math.floor(seconds/86400)}d`;
        }

        function refreshAll() {
            SERVERS.forEach(server => checkServer(server.id));
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            document.getElementById('auto-status').textContent =
                `Auto: ${autoRefreshEnabled ? 'ON' : 'OFF'}`;

            if (autoRefreshEnabled) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(refreshAll, 30000); // 30 seconds
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        // Start dashboard
        init();
    </script>
</body>
</html>
